name: Claude Code

on:
  pull_request:
    types: [opened, synchronize, reopened]
  issue_comment:
    types: [created]
  pull_request_review_comment:
    types: [created]

jobs:
  pr-review:
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: write
      id-token: write
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 1

      - uses: anthropics/claude-code-action@v1
        with:
          use_foundry: "true"
          track_progress: true
          prompt: |
            REPO: ${{ github.repository }}
            PR NUMBER: ${{ github.event.pull_request.number }}

            Fais une code review de cette PR selon 4 axes :
            - Bugs et régressions
            - Sécurité (secrets, injections, permissions, dépendances)
            - Qualité (lisibilité, duplication, nommage, conventions)
            - Tests manquants

            La branche PR est déjà checkée out dans le répertoire courant.
            Utilise `gh pr diff` pour voir les changements.
            Utilise `mcp__github_inline_comment__create_inline_comment` (avec `confirmed: true`) pour les problèmes attachés à des lignes spécifiques.
            Utilise `gh pr comment` uniquement pour un résumé global de la review.

            Ne poste pas le texte de review comme message — uniquement via les outils GitHub.
          claude_args: |
            --model claude-opus-4-7
            --max-turns 20
            --allowedTools "mcp__github_inline_comment__create_inline_comment,Read,Glob,Grep,Bash(gh pr diff:*),Bash(gh pr view:*),Bash(gh pr comment:*),Bash(git log:*),Bash(git diff:*),Bash(git show:*)"
        env:
          CLAUDE_CODE_USE_FOUNDRY: "1"
          ANTHROPIC_FOUNDRY_BASE_URL: ${{ secrets.AZURE_FOUNDRY_BASE_URL }}
          ANTHROPIC_FOUNDRY_API_KEY: ${{ secrets.ANTHROPIC_FOUNDRY_API_KEY }}
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_FOUNDRY_API_KEY }}

  claude-mention:
    if: |
      (github.event_name == 'issue_comment' && contains(github.event.comment.body, '@claude')) ||
      (github.event_name == 'pull_request_review_comment' && contains(github.event.comment.body, '@claude'))
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write
      issues: write
      id-token: write
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 1

      - uses: anthropics/claude-code-action@v1
        with:
          use_foundry: "true"
          track_progress: true
          claude_args: |
            --model claude-opus-4-7
            --max-turns 30
            --allowedTools "mcp__github_inline_comment__create_inline_comment,Read,Glob,Grep,Edit,Write,Bash(gh pr diff:*),Bash(gh pr view:*),Bash(gh pr comment:*),Bash(gh issue view:*),Bash(gh issue comment:*),Bash(git log:*),Bash(git diff:*),Bash(git show:*),Bash(git status),Bash(git add:*),Bash(git commit:*),Bash(git push:*)"
        env:
          CLAUDE_CODE_USE_FOUNDRY: "1"
          ANTHROPIC_FOUNDRY_BASE_URL: ${{ secrets.AZURE_FOUNDRY_BASE_URL }}
          ANTHROPIC_FOUNDRY_API_KEY: ${{ secrets.ANTHROPIC_FOUNDRY_API_KEY }}
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_FOUNDRY_API_KEY }}
