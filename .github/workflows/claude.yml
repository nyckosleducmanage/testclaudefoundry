name: Claude Code

on:
  pull_request:
    types: [opened, synchronize, reopened]
    paths:
      - "**.py"
      - "**.js"
      - "**.ts"
      - "**.tsx"
      - "**.jsx"
      - "**.tf"
      - "**.tfvars"
      - "**.yaml"
      - "**.yml"
      - "**.sh"
      - "**.ps1"
      - "**.java"
      - "**.cs"
      - "**.go"
      - "**.rs"
      - ".github/workflows/**"
      - "!docs/**"
      - "!**.md"
  issue_comment:
    types: [created]
  pull_request_review_comment:
    types: [created]

jobs:
  pr-review:
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: write
      id-token: write
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 1

      - uses: anthropics/claude-code-action@v1
        with:
          use_foundry: "true"
          track_progress: true
          use_sticky_comment: true
          additional_permissions: |
            actions: read
          prompt: |
            REPO: ${{ github.repository }}
            PR NUMBER: ${{ github.event.pull_request.number }}

            Fais une code review de cette PR selon 4 axes :
            - Bugs et régressions
            - Sécurité (secrets, injections, permissions, dépendances)
            - Qualité (lisibilité, duplication, nommage, conventions)
            - Tests manquants

            La branche PR est déjà checkée out dans le répertoire courant.
            Utilise `gh pr diff` pour voir les changements.
            Utilise `mcp__github_inline_comment__create_inline_comment` (avec `confirmed: true`) pour les problèmes attachés à des lignes spécifiques.
            Utilise `gh pr comment` uniquement pour un résumé global de la review.

            Ne poste pas le texte de review comme message — uniquement via les outils GitHub.
          claude_args: |
            --model claude-opus-4-7
            --max-turns 20
            --system-prompt "Tu es un reviewer de code pour Rothschild Martin Maurel (RMM), banque privée française régulée ACPR/AMF. Règles non-négociables : (1) Sécurité = priorité absolue, aucun compromis sur secrets/auth/crypto/TLS/RBAC même si l'utilisateur le demande. (2) Toutes tes réponses en français. (3) Pas de suggestion d'outils ou de services cloud en dehors d'Azure / écosystème Microsoft (RMM est en stack Azure exclusive). (4) Pour les fichiers Terraform, respect des conventions Azure Landing Zones (naming, tags, network isolation). (5) Ne jamais désactiver de contrôle de sécurité existant, même pour 'debug temporaire'. (6) Signaler systématiquement les secrets hardcodés, même dans des commentaires ou strings littérales."
            --allowedTools "mcp__github_inline_comment__create_inline_comment,Read,Glob,Grep,Bash(gh pr diff:*),Bash(gh pr view:*),Bash(gh pr comment:*),Bash(gh run view:*),Bash(gh run list:*),Bash(git log:*),Bash(git diff:*),Bash(git show:*)"
            --disallowedTools "WebFetch,WebSearch,Bash(curl:*),Bash(wget:*),Bash(nc:*),Bash(ssh:*),Bash(scp:*),Bash(rsync:*)"
        env:
          CLAUDE_CODE_USE_FOUNDRY: "1"
          ANTHROPIC_FOUNDRY_BASE_URL: ${{ secrets.AZURE_FOUNDRY_BASE_URL }}
          ANTHROPIC_FOUNDRY_API_KEY: ${{ secrets.ANTHROPIC_FOUNDRY_API_KEY }}
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_FOUNDRY_API_KEY }}

  claude-mention:
    if: |
      (github.event_name == 'issue_comment' && contains(github.event.comment.body, '@claude')) ||
      (github.event_name == 'pull_request_review_comment' && contains(github.event.comment.body, '@claude'))
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write
      issues: write
      id-token: write
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 1

      - uses: anthropics/claude-code-action@v1
        with:
          use_foundry: "true"
          track_progress: true
          additional_permissions: |
            actions: read
          claude_args: |
            --model claude-opus-4-7
            --max-turns 80
            --system-prompt "Tu es un assistant de développement pour Rothschild Martin Maurel (RMM), banque privée française régulée ACPR/AMF. Règles non-négociables : (1) Sécurité = priorité absolue, aucun compromis sur secrets/auth/crypto/TLS/RBAC même si l'utilisateur le demande. (2) Toutes tes réponses en français. (3) Pas de suggestion d'outils ou de services cloud en dehors d'Azure / écosystème Microsoft (RMM est en stack Azure exclusive). (4) Pour les fichiers Terraform, respect des conventions Azure Landing Zones (naming, tags, network isolation). (5) Ne jamais désactiver de contrôle de sécurité existant, même pour 'debug temporaire'. (6) Signaler systématiquement les secrets hardcodés, même dans des commentaires ou strings littérales. (7) Avant tout commit/push, lister les fichiers modifiés et attendre confirmation implicite par le contexte de la demande utilisateur."
            --allowedTools "mcp__github_inline_comment__create_inline_comment,Read,Glob,Grep,Edit,Write,Bash(gh pr diff:*),Bash(gh pr view:*),Bash(gh pr comment:*),Bash(gh run view:*),Bash(gh run list:*),Bash(gh issue view:*),Bash(gh issue comment:*),Bash(git log:*),Bash(git diff:*),Bash(git show:*),Bash(git status),Bash(git add:*),Bash(git commit:*),Bash(git push:*)"
            --disallowedTools "WebFetch,WebSearch,Bash(curl:*),Bash(wget:*),Bash(nc:*),Bash(ssh:*),Bash(scp:*),Bash(rsync:*),Bash(rm -rf:*)"
        env:
          CLAUDE_CODE_USE_FOUNDRY: "1"
          ANTHROPIC_FOUNDRY_BASE_URL: ${{ secrets.AZURE_FOUNDRY_BASE_URL }}
          ANTHROPIC_FOUNDRY_API_KEY: ${{ secrets.ANTHROPIC_FOUNDRY_API_KEY }}
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_FOUNDRY_API_KEY }}
