name: Claude Code

on:
  pull_request:
    types: [opened, synchronize, reopened]
  issue_comment:
    types: [created]
  pull_request_review_comment:
    types: [created]

jobs:
  pr-review:
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: write
      id-token: write
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: anthropics/claude-code-action@v1
        with:
          use_foundry: "true"
          show_full_output: "true"
          prompt: |
            Tu dois faire la code review de la PR #${{ github.event.pull_request.number }} sur le repo ${{ github.repository }}.
            Branche source : ${{ github.event.pull_request.head.ref }}
            Branche cible : ${{ github.event.pull_request.base.ref }}

            Étapes :
            1. Récupère le diff avec : gh pr diff ${{ github.event.pull_request.number }}
            2. Analyse les changements selon 4 axes : bugs/régressions, sécurité (secrets, injections, permissions), qualité (lisibilité, duplication, nommage), tests manquants
            3. Poste UN SEUL commentaire de synthèse sur la PR avec : gh pr comment ${{ github.event.pull_request.number }} --body "ton commentaire markdown"

            Format du commentaire :
            - Commence par un résumé d'une ligne
            - Puis des sections ## Bugs, ## Sécurité, ## Qualité, ## Tests
            - Sous chaque section, liste en bullets les points trouvés, ou écris "RAS" si rien à signaler
            - Sois factuel et concis. Pas de blabla introductif ni de conclusion.
            - Ne signale pas la même chose deux fois.

            N'utilise pas d'autres outils que ceux nécessaires à cette tâche. Ne fouille pas l'environnement.
          claude_args: |
            --model claude-opus-4-7
            --allowedTools "Read,Glob,Grep,Bash(gh pr diff:*),Bash(gh pr view:*),Bash(gh pr comment:*),Bash(git log:*),Bash(git diff:*),Bash(git show:*),Bash(git status),Bash(cat:*),Bash(ls:*),Bash(pwd)"
        env:
          CLAUDE_CODE_USE_FOUNDRY: "1"
          ANTHROPIC_FOUNDRY_BASE_URL: ${{ secrets.AZURE_FOUNDRY_BASE_URL }}
          ANTHROPIC_FOUNDRY_API_KEY: ${{ secrets.ANTHROPIC_FOUNDRY_API_KEY }}
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_FOUNDRY_API_KEY }}

  claude-mention:
    if: |
      (github.event_name == 'issue_comment' && contains(github.event.comment.body, '@claude')) ||
      (github.event_name == 'pull_request_review_comment' && contains(github.event.comment.body, '@claude'))
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write
      issues: write
      id-token: write
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: anthropics/claude-code-action@v1
        with:
          use_foundry: "true"
          show_full_output: "true"
          claude_args: |
            --model claude-opus-4-7
            --allowedTools "Read,Glob,Grep,Edit,Write,Bash(gh pr diff:*),Bash(gh pr view:*),Bash(gh pr comment:*),Bash(gh pr checkout:*),Bash(gh issue view:*),Bash(gh issue comment:*),Bash(git log:*),Bash(git diff:*),Bash(git show:*),Bash(git status),Bash(git add:*),Bash(git commit:*),Bash(git push:*),Bash(cat:*),Bash(ls:*),Bash(pwd)"
        env:
          CLAUDE_CODE_USE_FOUNDRY: "1"
          ANTHROPIC_FOUNDRY_BASE_URL: ${{ secrets.AZURE_FOUNDRY_BASE_URL }}
          ANTHROPIC_FOUNDRY_API_KEY: ${{ secrets.ANTHROPIC_FOUNDRY_API_KEY }}
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_FOUNDRY_API_KEY }}
